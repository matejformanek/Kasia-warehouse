name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_DB: kasia
          POSTGRES_USER: kasia
          POSTGRES_PASSWORD: kasia
        options: >-
          --health-cmd "pg_isready -U kasia -d kasia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgres://kasia:kasia@localhost:5432/kasia
      DJANGO_SECRET_KEY: ci-only-secret
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_DEBUG: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Pin Python
        run: uv python install

      - name: uv sync
        run: uv sync --frozen

      - name: ruff
        run: uv run ruff check .

      - name: django check
        run: uv run python manage.py check

      # Build the static manifest the same way the Docker image does
      # (CompressedManifestStaticFilesStorage). Fails the PR if any CSS
      # url()/@import can't be resolved/rewritten — catching that class of
      # static regression at PR time instead of only at deploy-build time.
      - name: collectstatic
        run: uv run python manage.py collectstatic --noinput

      - name: pytest
        run: uv run pytest -q
