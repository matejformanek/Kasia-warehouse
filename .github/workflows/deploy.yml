name: deploy

# Dormant until infra/RUNBOOK.md one-time bring-up is complete:
# Hetzner box provisioned, /srv/kasia .env populated, single GH
# Actions secret SSH_KEY set (host + user are hardcoded literals
# below — non-secret per 2026-06-16 decision). GHCR push uses the
# built-in GITHUB_TOKEN — no PAT.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          IMAGE="${IMAGE,,}"
          SHA_TAG="${IMAGE}:sha-${GITHUB_SHA::12}"
          LATEST_TAG="${IMAGE}:latest"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 91.98.47.1
          username: app
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/kasia
            git fetch --depth 1 origin main
            git reset --hard origin/main
            export WEB_IMAGE="${{ needs.build.outputs.image_tag }}"
            docker compose --profile prod pull
            docker compose run --rm web python manage.py migrate --noinput
            docker compose --profile prod up -d --remove-orphans
            docker image prune -f
