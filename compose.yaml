# Per context/decisions/0023-runtime-orchestration-compose.md.
# Same file is used for local dev and on the production VPS;
# differences live in .env. The `backup` service is profiled so it
# stays out of the local dev loop.

name: kasia

services:
  web:
    build: .
    image: ${WEB_IMAGE:-kasia-web:local}
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: kasia.settings.base
      DATABASE_URL: postgres://kasia:${POSTGRES_PASSWORD}@db:5432/kasia
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks: [internal]

  db:
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: kasia
      POSTGRES_USER: kasia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # ICU locale provider per context/decisions/0038-db-locale-icu.md.
      # The stock postgres:18-trixie image ships ICU but does NOT
      # generate the cs_CZ.UTF-8 libc locale; using libc here fails
      # at initdb. ICU is the PG18-native answer and gives the same
      # Czech sort order Karolína expects in the catalogue.
      # --locale=C.UTF-8 covers the few libc-bound bits ICU doesn't
      # (uppercase folding, regex char classes); --icu-locale=cs-CZ
      # drives collation.
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=cs-CZ --locale=C.UTF-8 --encoding=UTF8"
    volumes:
      # Postgres 18+ requires the mount one level above `data` so the
      # image can manage major-version-specific cluster subdirectories
      # (.../<major>/docker). Mounting at /var/lib/postgresql/data on
      # 18+ fails at startup. See docker-library/postgres#1259.
      - pgdata:/var/lib/postgresql
    ports:
      # Localhost-bound only — emergency psql access from the host,
      # never reachable from outside the box. Drop the publish line
      # entirely on production if Matej prefers `docker exec` only.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasia -d kasia"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  proxy:
    image: caddy:2-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      # Published for the HTTPS cutover (per 0056). Caddy serves the
      # Let's Encrypt cert here once DNS resolves to the box.
      - "443:443"
    volumes:
      # Prod serves the committed ./Caddyfile (kasia.cz + Let's Encrypt). Local
      # dev sets CADDYFILE=./Caddyfile.dev in .env to serve http://localhost
      # with auto_https off — no ACME attempts, no cert failures. Default keeps
      # prod behaviour unchanged. Per 0083.
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks: [internal]

  umami:
    # Public-site analytics per context/decisions/0076-public-site-analytics.md.
    # Pinned to the exact release tag, never `latest`; immutable digest recorded
    # in the PR that bumps this line. Prod-only, same as `backup` — the local
    # `make up` loop never needs the analytics stack.
    image: umamisoftware/umami:3.2.0
    profiles: [prod]
    depends_on:
      umami-db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
    restart: unless-stopped
    networks: [internal]

  umami-db:
    # Umami's own Postgres — the warehouse cluster stays untouched (0076).
    image: postgres:18-trixie
    profiles: [prod]
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      # Plain UTF-8; Umami doesn't need the ICU collations the warehouse
      # db service carries per 0038.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      # Same one-level-above-`data` mount as the db service (PG18+,
      # docker-library/postgres#1259).
      - umami_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  backup:
    # Off-box restic backups to Hetzner Storage Box per
    # context/decisions/0027-hosting-hetzner.md. Excluded from the
    # default local dev loop via the `prod` profile.
    profiles: [prod]
    image: offen/docker-volume-backup:latest
    depends_on:
      - db
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_FILENAME: kasia-%Y-%m-%dT%H-%M-%S.tar.gz
      BACKUP_SOURCES: /backup
      BACKUP_STOP_CONTAINER_LABEL: kasia-backup
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
    volumes:
      # Mount matches the db service (see note there) so backups capture
      # the version-specific cluster subdirectory.
      - pgdata:/backup/pgdata:ro
      - umami_pgdata:/backup/umami_pgdata:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks: [internal]

volumes:
  pgdata:
  umami_pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
