#cloud-config
# First-boot config per context/decisions/0025-iac-terraform-hcloud.md.
# Installs Docker engine, sets up a 2 GB swap file, creates the
# unprivileged `app` user, and clones the repo to /srv/kasia.
# Production .env is *not* deployed by this file — Matej writes it
# manually after first boot per infra/RUNBOOK.md.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - ufw

ssh_authorized_keys: []  # filled by hcloud_ssh_key for root; app inherits below

users:
  - name: app
    groups: [docker]
    shell: /bin/bash
    sudo: null
    ssh_authorized_keys: []  # populated at runcmd time from root's keys

write_files:
  - path: /etc/sysctl.d/99-kasia.conf
    content: |
      vm.swappiness = 10

runcmd:
  # Swap (2 GB).
  - fallocate -l 2G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - sh -c 'echo "/swapfile none swap sw 0 0" >> /etc/fstab'
  - sysctl -p /etc/sysctl.d/99-kasia.conf

  # Docker engine + compose plugin via the official Docker apt repo.
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - sh -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # Seed the app user's authorized_keys from root's (Hetzner only
  # provisions the hcloud_ssh_key for root; deploy.yml SSHes as app).
  - install -d -m 700 -o app -g app /home/app/.ssh
  - cp /root/.ssh/authorized_keys /home/app/.ssh/authorized_keys
  - chmod 600 /home/app/.ssh/authorized_keys
  - chown app:app /home/app/.ssh/authorized_keys

  # App checkout (shallow; CI pulls GHCR images thereafter). Repo is
  # public per the 2026-06-16 provisioning decision; clone is anon.
  - mkdir -p /srv/kasia
  - chown app:app /srv/kasia
  - sudo -u app git clone --depth 1 https://github.com/matejformanek/Kasia-warehouse.git /srv/kasia

  # Local UFW belt-and-braces (Hetzner firewall is the real gate).
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
