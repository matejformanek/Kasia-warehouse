{% load static %}<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stránka nenalezena (404) — Kasia vera</title>
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'brand/favicon-32.png' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #235c33; --green-dark: #18421f; --green-soft: #eef4ee; --green-500: #2a9961;
    --fg: #1d211d; --fg-soft: #5a615a; --bg: #ffffff; --line: #e4ece8;
    --radius: 18px; --shadow: 0 1px 2px rgba(16,35,26,.04), 0 12px 32px -16px rgba(16,35,26,.18);
    --ui: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    --display: "Sora", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: var(--ui); color: var(--fg); padding: 1.5rem;
    background: radial-gradient(closest-side at 50% 0%, var(--green-soft), var(--bg) 70%);
  }
  .panel {
    max-width: 540px; width: 100%; text-align: center;
    background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 3rem 2rem;
  }
  .brand { display: inline-flex; align-items: center; gap: 0.6rem; text-decoration: none; margin-bottom: 1.5rem; }
  .brand img { height: 40px; width: auto; display: block; }
  .brand .name { font-family: var(--display); font-weight: 700; color: var(--green-dark); font-size: 1.2rem; letter-spacing: -.02em; }
  .code { font-family: var(--display); font-weight: 800; font-size: clamp(3.5rem, 12vw, 5.5rem); line-height: 1; color: var(--green-500); margin: 0; }
  h1 { font-family: var(--display); font-weight: 700; color: var(--green-dark); font-size: 1.5rem; margin: 0.5rem 0 0.75rem; }
  p { color: var(--fg-soft); font-size: 1.05rem; margin: 0 auto 1.75rem; max-width: 40ch; }
  .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
  .btn {
    display: inline-flex; align-items: center; gap: .4em; font-family: var(--display);
    text-decoration: none; font-weight: 600; padding: 0.7em 1.4em; border-radius: 999px;
    border: 1.5px solid transparent; cursor: pointer;
  }
  .btn-primary { background: var(--green); color: #fff; box-shadow: 0 8px 20px -10px rgba(31,122,77,.7); }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-outline { border-color: var(--line); color: var(--green-dark); }
  .btn-outline:hover { background: var(--green-soft); border-color: var(--green-500); }
</style>
</head>
<body>
  <main class="panel">
    <a class="brand" href="{% url 'web:home' %}">
      <img src="{% static 'brand/kasia-logo.jpg' %}" alt="Kasia vera">
      <span class="name">Kasia vera</span>
    </a>
    <p class="code">404</p>
    <h1>Stránka nenalezena</h1>
    <p>
      Tuto stránku se nepodařilo najít — možná byla přesunuta, smazána,
      nebo je v odkazu překlep.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="{% url 'web:home' %}">Zpět na úvod</a>
      <a class="btn btn-outline" href="{% url 'login' %}">Přihlášení do skladu</a>
    </div>
  </main>
</body>
</html>
