<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chyba serveru (500) — Kasia vera</title>
<style>
  /* Self-contained on purpose: a 500 means something is already broken,
     so this page depends on no static files, fonts, or URL resolution. */
  :root {
    --green: #235c33; --green-dark: #18421f; --green-soft: #eef4ee; --green-500: #2a9961;
    --fg: #1d211d; --fg-soft: #5a615a; --bg: #ffffff; --line: #e4ece8; --radius: 18px;
    --ui: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: var(--ui); color: var(--fg); padding: 1.5rem;
    background: radial-gradient(closest-side at 50% 0%, var(--green-soft), var(--bg) 70%);
  }
  .panel {
    max-width: 540px; width: 100%; text-align: center;
    background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: 0 12px 32px -16px rgba(16,35,26,.18); padding: 3rem 2rem;
  }
  .name { font-weight: 700; color: var(--green-dark); font-size: 1.2rem; letter-spacing: -.02em; margin-bottom: 1.25rem; }
  .code { font-weight: 800; font-size: clamp(3.5rem, 12vw, 5.5rem); line-height: 1; color: var(--green-500); margin: 0; }
  h1 { font-weight: 700; color: var(--green-dark); font-size: 1.5rem; margin: 0.5rem 0 0.75rem; }
  p { color: var(--fg-soft); font-size: 1.05rem; margin: 0 auto 1.75rem; max-width: 42ch; }
  .btn {
    display: inline-flex; text-decoration: none; font-weight: 600; padding: 0.7em 1.4em;
    border-radius: 999px; background: var(--green); color: #fff;
  }
  .btn:hover { background: var(--green-dark); }
</style>
</head>
<body>
  <main class="panel">
    <div class="name">Kasia vera</div>
    <p class="code">500</p>
    <h1>Chyba serveru</h1>
    <p>
      Omlouváme se — na naší straně došlo k chybě. Zkuste to prosím za chvíli
      znovu. Pokud potíže přetrvávají, dejte nám vědět.
    </p>
    <a class="btn" href="/">Zpět na úvod</a>
  </main>
</body>
</html>
