{% comment %}
HTMX partial: returned by stock_warn_partial. Empty when no issue.
{% endcomment %}
{% if qty %}
  {% if over %}
    <div class="stock-warn over">
      Na skladě je pouze {{ on_hand }} kg — výdej {{ qty }} kg překračuje stav.
    </div>
  {% else %}
    <div class="stock-warn">
      Na skladě: {{ on_hand }} kg.
    </div>
  {% endif %}
{% endif %}
