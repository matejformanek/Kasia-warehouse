{% extends "base.html" %}

{% block title %}Nová výrobní dávka — Kasia vera{% endblock %}

{% block content %}
<h1>Nová výrobní dávka</h1>

{% if error %}
  <div class="non-form-errors">{{ error }}</div>
{% endif %}

<p class="required-legend">povinné pole</p>

<form method="post">
  {% csrf_token %}
  <div class="card">
    {% if is_branch_locked %}
      <div class="field">
        <label class="field-required">Pobočka</label>
        <input type="text" value="{{ default_branch.code }} — {{ default_branch.name }}" disabled>
        <input type="hidden" name="branch" value="{{ default_branch.pk }}">
      </div>
    {% else %}
      <div class="field">
        <label class="field-required" for="id_branch">Pobočka</label>
        <select name="branch" id="id_branch">
          {% for b in branches %}
            <option value="{{ b.pk }}" {% if default_branch and b.pk == default_branch.pk %}selected{% endif %}>
              {{ b.code }} — {{ b.name }}
            </option>
          {% endfor %}
        </select>
      </div>
    {% endif %}

    <div class="field">
      <label class="field-required" for="id_mixture">Směs</label>
      <select name="mixture" id="id_mixture"
              hx-get="{% url 'inventory:mixing_preview_partial' %}"
              hx-trigger="change"
              hx-target="#mixing-preview"
              hx-include="closest form"
              hx-params="branch,mixture,target_qty">
        <option value="">— vyberte směs —</option>
        {% for m in mixtures %}
          <option value="{{ m.pk }}"{% if m.pk|stringformat:"s" == selected_mixture_id %} selected{% endif %}>{{ m.name_cs }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="field">
      <label class="field-required" for="id_target_qty">Cílové množství (kg)</label>
      <input type="number" step="0.001" min="0.001"
             name="target_qty" id="id_target_qty"
             hx-get="{% url 'inventory:mixing_preview_partial' %}"
             hx-trigger="input changed delay:400ms"
             hx-target="#mixing-preview"
             hx-include="closest form"
             hx-params="branch,mixture,target_qty">
    </div>

    <div class="field">
      <label for="id_note">Poznámka</label>
      <textarea name="note" id="id_note" rows="2"></textarea>
    </div>
  </div>

  <div id="mixing-preview"></div>

  <div class="card">
    <h2 style="font-size:1.05rem;margin-top:0;">Režim</h2>
    <p>
      <label>
        <input type="radio" name="mode" value="start" checked> Zahájit dávku
        <span style="color:var(--fg-soft);">— spotřeba se zapíše hned, produkce se doplní po smíchání.</span>
      </label>
    </p>
    <p>
      <label>
        <input type="radio" name="mode" value="record"> Zaznamenat dokončenou dávku
        <span style="color:var(--fg-soft);">— když jste zapomněli otevřít obrazovku na začátku.</span>
      </label>
    </p>
    <div class="field">
      <label for="id_actual_produced_qty">Skutečně vyrobeno (kg) — jen pro „Zaznamenat dokončenou"</label>
      <input type="number" step="0.001" min="0"
             name="actual_produced_qty" id="id_actual_produced_qty">
    </div>
  </div>

  <p>
    <button class="primary" type="submit">Pokračovat</button>
    <a class="secondary" href="{% url 'inventory:home' %}">Zrušit</a>
  </p>
</form>
{% endblock %}
