{% extends "base.html" %}
{% block title %}Reset hesla — Kasia vera{% endblock %}

{% block content %}
<h1>Reset hesla</h1>
<p>Zadejte e-mail svého účtu. Pokud existuje, pošleme vám odkaz pro nastavení nového hesla.</p>
<form method="post" class="card">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="primary">Odeslat odkaz</button>
</form>
{% endblock %}
